version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - cd build/compute/default && npm i --omit=dev && node -e "const f=require('fs');const p='server';f.readdirSync(p,{recursive:true}).filter(x=>x.endsWith('.js')).forEach(x=>{const fp=p+'/'+x;let c=f.readFileSync(fp,'utf8');if(c.includes('REPLACE_WITH_DB_URL')){c=c.replace(/REPLACE_WITH_DB_URL/g,process.env.DATABASE_URL||'');f.writeFileSync(fp,c);console.log('Injected into '+x)}})"
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
