version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - cd build/compute/default && npm i --omit=dev
        - grep -rl 'REPLACE_WITH_DB_URL' build/compute/default/server/ | xargs -r sed -i "s|REPLACE_WITH_DB_URL|$DATABASE_URL|g"
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
